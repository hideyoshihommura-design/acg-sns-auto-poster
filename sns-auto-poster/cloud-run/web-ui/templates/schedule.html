<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スケジュール管理 - SNS投稿管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .sidebar { background: #1a1a2e; min-height: 100vh; padding: 20px 0; }
    .sidebar a { color: #ccc; text-decoration: none; display: block; padding: 10px 20px; }
    .sidebar a:hover, .sidebar a.active { color: #fff; background: #16213e; }
    .sidebar .brand { color: #fff; font-size: 1.1rem; font-weight: bold; padding: 10px 20px 20px; }
  </style>
</head>
<body>
<div class="d-flex">
  <div class="sidebar" style="width: 220px; flex-shrink: 0;">
    <div class="brand"><i class="bi bi-broadcast"></i> SNS投稿管理</div>
    <a href="/"><i class="bi bi-speedometer2"></i> ダッシュボード</a>
    <a href="/schedule" class="active"><i class="bi bi-calendar3"></i> スケジュール管理</a>
    <a href="/history"><i class="bi bi-clock-history"></i> 投稿履歴</a>
    <a href="/generate"><i class="bi bi-robot"></i> AI生成</a>
    <a href="/errors"><i class="bi bi-exclamation-triangle"></i> エラーログ</a>
    <a href="/system"><i class="bi bi-gear"></i> システム設定</a>
  </div>

  <div class="flex-grow-1 p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>スケジュール管理</h2>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
        <i class="bi bi-plus-circle"></i> 新規スケジュール
      </button>
    </div>

    <!-- スケジュール一覧 -->
    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>プラットフォーム</th>
              <th>投稿内容</th>
              <th>予定日時</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            {% for post in scheduled_posts %}
            <tr>
              <td><span class="badge bg-secondary">{{ post.platform }}</span></td>
              <td>{{ post.content[:80] }}...</td>
              <td>{{ post.scheduled_at }}</td>
              <td>
                <form method="POST" action="/schedule/{{ post.id }}/delete" style="display:inline;">
                  <button type="submit" class="btn btn-sm btn-danger"
                    onclick="return confirm('削除しますか？')">
                    <i class="bi bi-trash"></i>
                  </button>
                </form>
              </td>
            </tr>
            {% else %}
            <tr><td colspan="4" class="text-center text-muted p-4">スケジュール済み投稿はありません</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 新規スケジュール作成モーダル -->
<div class="modal fade" id="createModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">新規スケジュール投稿</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form method="POST" action="/schedule/create">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">プラットフォーム</label>
            <select name="platform" class="form-select" required>
              <option value="twitter">Twitter/X</option>
              <option value="instagram">Instagram</option>
              <option value="facebook">Facebook</option>
              <option value="tiktok">TikTok</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">投稿内容</label>
            <textarea name="content" class="form-control" rows="5" required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">画像URL（任意）</label>
            <input type="url" name="image_url" class="form-control" placeholder="https://...">
          </div>
          <div class="mb-3">
            <label class="form-label">投稿予定日時</label>
            <input type="datetime-local" name="scheduled_at" class="form-control" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="submit" class="btn btn-primary">スケジュール登録</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
